# Secrets come from the environment so they never land in git.
#   export ASSESSMENT_BASEURL=https://...
#   export ASSESSMENT_APIKEY=sa_...
assessment.base-url=${ASSESSMENT_BASEURL:}
assessment.api-key=${ASSESSMENT_APIKEY:}
assessment.output-dir=${ASSESSMENT_OUTPUTDIR:./out}

# This is a CLI-style app, not a server. Don't keep a web server alive.
spring.main.web-application-type=none

logging.level.com.assessment=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n
